name: release_docker

on:
  push:
    tags:
      - "v*"
env:
  REGISTRY: "alliot/alist"
  REGISTRY_USERNAME: "alliot"
  ARTIFACT_NAME: "binaries_docker_release"
  RELEASE_PLATFORMS: "linux/amd64,linux/arm64"

jobs:
  build_binary:
    name: Build Binaries for Docker Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod

      - name: Cache Musl
        id: cache-musl
        uses: actions/cache@v6.1.0
        with:
          path: build/musl-libs
          key: docker-musl-libs-v2

      - name: Download Musl Library
        if: steps.cache-musl.outputs.cache-hit != 'true'
        run: bash build.sh prepare docker-multiplatform

      - name: Build Go binaries
        run: bash build.sh release docker-multiplatform

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          if-no-files-found: error
          retention-days: 1
          path: |
            build/
            !build/*.tgz
            !build/musl-libs/**

  release_docker:
    needs: build_binary
    name: Release Docker image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: "latest"
            build_arg: ""
            tag_flavor: ""
          - image: "ffmpeg"
            build_arg: INSTALL_FFMPEG=true
            tag_flavor: "suffix=-ffmpeg,onlatest=true"
          - image: "aria2"
            build_arg: INSTALL_ARIA2=true
            tag_flavor: "suffix=-aria2,onlatest=true"
          - image: "aio"
            build_arg: |
              INSTALL_FFMPEG=true
              INSTALL_ARIA2=true
            tag_flavor: "suffix=-aio,onlatest=true"
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
      - uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: "build/"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Login to DockerHub
        uses: docker/login-action@v4.4.0
        with:
          logout: true
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.REGISTRY }}
          flavor: |
            latest=true
            ${{ matrix.tag_flavor }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: Dockerfile.ci
          push: true
          build-args: ${{ matrix.build_arg }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ env.RELEASE_PLATFORMS }}
