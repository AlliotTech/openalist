name: auto changelog

on:
  push:
    tags:
      - 'v*'

jobs:
  changelog:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Delete beta tag
        run: git tag -d beta
        continue-on-error: true

      - name: Verify release token
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::MY_TOKEN is not configured"
            exit 1
          fi
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG_NAME}" \
            >/dev/null

      - name: Remove existing release for this tag
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          release_id=$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" \
            --jq '.id' 2>/dev/null || true)
          if [ -n "$release_id" ]; then
            gh api --method DELETE \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          fi

      - name: Create GitHub release
        run: gh release create "$TAG_NAME" --generate-notes --verify-tag --title "$TAG_NAME"
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
